        // 初始化统计数据
        function updateStats() {
            const total = universities.length;
            const publicCount = universities.filter(u => u.type === "public").length;
            const privateCount = universities.filter(u => u.type === "private").length;
            
            document.getElementById('total-universities').textContent = total;
            document.getElementById('public-universities').textContent = publicCount;
            document.getElementById('private-universities').textContent = privateCount;
            
            // 更新筛选按钮数量
            updateFilterCounts();
        }
        
        // 更新各城市筛选按钮的院校数量
        function updateFilterCounts() {
            const cityCounts = {};
            
            // 统计各城市院校数量
            universities.forEach(university => {
                const city = university.city.replace('市', '');
                if (!cityCounts[city]) {
                    cityCounts[city] = 0;
                }
                cityCounts[city]++;
            });
            
            // 更新筛选按钮文本
            document.querySelectorAll('.filter-btn').forEach(button => {
                const filter = button.dataset.filter;
                if (filter === 'all') {
                    button.textContent = `全部院校 (${universities.length})`;
                } else if (filter === 'public') {
                    button.textContent = `公办院校 (${universities.filter(u => u.type === 'public').length})`;
                } else if (filter === 'private') {
                    button.textContent = `民办院校 (${universities.filter(u => u.type === 'private').length})`;
                } else {
                    // 城市筛选
                    const cityName = getCityChineseName(filter);
                    if (cityCounts[cityName]) {
                        button.textContent = `${cityName}市 (${cityCounts[cityName]})`;
                    }
                }
            });
        }

            const cityMap = {
                'hefei': '合肥',

                'maanshan': '马鞍山',

        // 渲染院校卡片 - 支持高亮和排序
        function renderUniversities(filteredUniversities = universities) {
            const grid = document.getElementById('universitiesGrid');
            const noResults = document.getElementById('noResults');
            
            if (filteredUniversities.length === 0) {
                grid.innerHTML = '';
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            
            // 如果有搜索词，计算匹配分数并排序
            let universitiesToRender = [...filteredUniversities];
            if (currentSearch) {
                universitiesToRender = universitiesToRender.map(university => ({
                    ...university,
                    _matchScore: getMatchScore(university, currentSearch)
                })).sort((a, b) => b._matchScore - a._matchScore);
            }
            
            grid.innerHTML = universitiesToRender.map(university => {
                // 高亮匹配的文本
                const highlightedName = highlightText(university.name, currentSearch);
                const highlightedCity = highlightText(university.city, currentSearch);
                const highlightedDescription = highlightText(university.description, currentSearch);
                const highlightedRanking = highlightText(university.ranking, currentSearch);
                
                return `
                <a href="${university.link}" class="university-card" data-type="${university.type}" data-city="${university.city}">
                    ${university.type === 'private' ? '<span class="university-badge">民办</span>' : ''}
                    <div class="university-img" style="background: linear-gradient(135deg, ${university.type === 'public' ? '#1a73e8, #6a11cb' : '#ff6b6b, #ff8e8e'}); display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; font-weight: bold;">
                        ${university.logo}
                    </div>
                    <div class="university-content">
                        <h3 class="university-name">${highlightedName}</h3>
                        <div class="university-location">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${highlightedCity}</span>
                        </div>
                        <p style="color: #666; font-size: 0.95rem; line-height: 1.5;">${highlightedDescription}</p>
                        <div class="university-info">
                            <div class="info-item">
                                <div class="info-label">在校生</div>
                                <div class="info-value">${university.students}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">专业数</div>
                                <div class="info-value">${university.majors}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label">排名</div>
                                <div class="info-value">${highlightedRanking}</div>
                            </div>
                        </div>
                        ${currentSearch && university._matchScore > 0 ? `
                        <div style="margin-top: 10px; font-size: 0.8rem; color: #666; text-align: right;">
                            <i class="fas fa-star" style="color: #ffd700;"></i> 匹配度: ${university._matchScore}%
                        </div>
                        ` : ''}
                    </div>
                </a>
                `;
            }).join('');
        }

        // 组合筛选数据结构
        let activeFilters = {
            type: new Set(), // 存储选中的类型：'public', 'private'
            city: new Set()  // 存储选中的城市代码：'hefei', 'wuhu', 等
        };
        
        // 全局搜索变量
        let currentSearch = '';

        // 搜索功能
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const filterButtons = document.querySelectorAll('.filter-btn');
            
            // 城市代码到中文名称的映射
            const cityCodeToName = {
                'hefei': '合肥市',
                'wuhu': '芜湖市',
                'fuyang': '阜阳市',
                'maanshan': '马鞍山市',
                'anqing': '安庆市',
                'bengbu': '蚌埠市',
                'huainan': '淮南市',
                'chuzhou': '滁州市',
                'suzhou': '宿州市',
                'huangshan': '黄山市',
                'chizhou': '池州市',
                'bozhou': '亳州市',
                'huaibei': '淮北市',
                'liuan': '六安市'
            };

            // 中文名称到城市代码的映射
            const cityNameToCode = {
                '合肥市': 'hefei',
                '芜湖市': 'wuhu',
                '阜阳市': 'fuyang',
                '马鞍山市': 'maanshan',
                '安庆市': 'anqing',
                '蚌埠市': 'bengbu',
                '淮南市': 'huainan',
                '滁州市': 'chuzhou',
                '宿州市': 'suzhou',
                '黄山市': 'huangshan',
                '池州市': 'chizhou',
                '亳州市': 'bozhou',
                '淮北市': 'huaibei',
                '六安市': 'liuan'
            };

            function filterUniversities() {
                return universities.filter(university => {
                    // 应用类型筛选
                    if (activeFilters.type.size > 0) {
                        if (!activeFilters.type.has(university.type)) {
                            return false;
                        }
                    }
                    
                    // 应用城市筛选
                    if (activeFilters.city.size > 0) {
                        const cityCode = cityNameToCode[university.city];
                        if (!cityCode || !activeFilters.city.has(cityCode)) {
                            return false;
                        }
                    }
                    
                    // 应用搜索 - 支持拼音搜索和模糊匹配
                    if (currentSearch) {
                        return fuzzyMatch(university, currentSearch);
                    }
                    
                    return true;
                });
            }
            
            function updateDisplay() {
                const filtered = filterUniversities();
                renderUniversities(filtered);
                
                // 更新显示结果数量
                updateResultsCount(filtered.length);
            }
            
            // 更新结果显示数量和筛选状态
            function updateResultsCount(count) {
                const resultsTitle = document.querySelector('.universities-section h2');
                if (!resultsTitle) return;
                
                let filterText = '';
                const hasTypeFilter = activeFilters.type.size > 0;
                const hasCityFilter = activeFilters.city.size > 0;
                const hasSearch = currentSearch.trim().length > 0;
                
                if (!hasTypeFilter && !hasCityFilter && !hasSearch) {
                    resultsTitle.textContent = `招生院校列表 (${count}所)`;
                    return;
                }
                
                // 构建筛选描述
                const filterParts = [];
                
                if (hasTypeFilter) {
                    const typeNames = Array.from(activeFilters.type).map(type => 
                        type === 'public' ? '公办' : '民办'
                    );
                    filterParts.push(typeNames.join('、'));
                }
                
                if (hasCityFilter) {
                    const cityNames = Array.from(activeFilters.city).map(code => 
                        cityCodeToName[code]?.replace('市', '') || code
                    );
                    filterParts.push(cityNames.join('、'));
                }
                
                if (hasSearch) {
                    filterParts.push(`搜索"${currentSearch}"`);
                }
                
                if (filterParts.length > 0) {
                    filterText = ` (${filterParts.join(' + ')})`;
                }
                
                resultsTitle.textContent = `筛选结果: ${count}所${filterText}`;
            }
            
            // 搜索框事件 - 使用去抖优化性能
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                
                const searchValue = this.value;
                
                searchTimeout = setTimeout(() => {
                    currentSearch = searchValue.toLowerCase().trim();
                    updateDisplay();
                }, 150); // 150ms延迟，减少不必要的渲染
            });
            
            // 筛选按钮事件 - 支持多选
            filterButtons.forEach(button => {
                button.addEventListener('click', function(event) {
                    const filterType = this.dataset.filter;
                    const isCityFilter = !['all', 'public', 'private'].includes(filterType);
                    
                    // 检查是否按住Ctrl键或Shift键进行多选
                    const isMultiSelect = event.ctrlKey || event.shiftKey || event.metaKey;
                    
                    if (filterType === 'all') {
                        // 点击"全部"按钮重置所有筛选
                        activeFilters.type.clear();
                        activeFilters.city.clear();
                        filterButtons.forEach(btn => btn.classList.remove('active'));
                        this.classList.add('active');
                    } else {
                        if (isCityFilter) {
                            // 城市筛选
                            if (isMultiSelect) {
                                // 多选模式：切换选中状态
                                if (activeFilters.city.has(filterType)) {
                                    activeFilters.city.delete(filterType);
                                    this.classList.remove('active');
                                } else {
                                    activeFilters.city.add(filterType);
                                    this.classList.add('active');
                                }
                            } else {
                                // 单选模式：清空其他城市筛选
                                activeFilters.city.clear();
                                document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
                                    const btnFilter = btn.dataset.filter;
                                    if (!['all', 'public', 'private'].includes(btnFilter)) {
                                        btn.classList.remove('active');
                                    }
                                });
                                activeFilters.city.add(filterType);
                                this.classList.add('active');
                            }
                        } else {
                            // 类型筛选
                            if (isMultiSelect) {
                                // 多选模式：切换选中状态
                                if (activeFilters.type.has(filterType)) {
                                    activeFilters.type.delete(filterType);
                                    this.classList.remove('active');
                                } else {
                                    activeFilters.type.add(filterType);
                                    this.classList.add('active');
                                }
                            } else {
                                // 单选模式：清空其他类型筛选
                                activeFilters.type.clear();
                                document.querySelectorAll('.filter-btn[data-filter="all"], .filter-btn[data-filter="public"], .filter-btn[data-filter="private"]').forEach(btn => {
                                    btn.classList.remove('active');
                                });
                                activeFilters.type.add(filterType);
                                this.classList.add('active');
                            }
                        }
                    }
                    
                    // 更新显示
                    updateDisplay();
                });
            });
            
            // 初始渲染
            updateDisplay();
        }

        // 快速搜索标签功能
        function setupQuickSearch() {
            const tags = document.querySelectorAll('.tag');
            const searchInput = document.getElementById('searchInput');
            
            tags.forEach(tag => {
                tag.addEventListener('click', function() {
                    const searchText = this.dataset.search;
                    searchInput.value = searchText;
                    searchInput.focus();
                    
                    // 触发输入事件以进行搜索
                    const event = new Event('input', {
                        bubbles: true,
                        cancelable: true,
                    });
                    searchInput.dispatchEvent(event);
                });
            });
        }

        // 中文转拼音函数（简化版）
        function toPinyin(chinese) {
            const pinyinMap = {
                '安': 'an', '徽': 'hui', '工': 'gong', '业': 'ye', '大': 'da', '学': 'xue',
                '农': 'nong', '医': 'yi', '科': 'ke', '师': 'shi', '范': 'fan',
                '建': 'jian', '筑': 'zhu', '阜': 'fu', '阳': 'yang', '中': 'zhong', '药': 'yao',
                '庆': 'qing', '蚌': 'beng', '埠': 'bu', '皖': 'wan', '南': 'nan', '淮': 'huai',
                '技': 'ji', '合': 'he', '肥': 'fei', '黄': 'huang', '山': 'shan',
                '巢': 'chao', '湖': 'hu', '铜': 'tong', '陵': 'ling', '滁': 'chu', '州': 'zhou',
                '宿': 'su', '池': 'chi', '亳': 'bo', '艺': 'yi', '术': 'shu', '芜': 'wu',
                '职': 'zhi', '新': 'xin', '华': 'hua', '三': 'san', '联': 'lian',
                '外': 'wai', '国': 'guo', '语': 'yu', '信': 'xin', '息': 'xi', '经': 'jing',
                '济': 'ji', '城': 'cheng', '理': 'li', '文': 'wen', '达': 'da', '临': 'lin',
                '床': 'chuang', '院': 'yuan'
            };
            
            let pinyin = '';
            for (let char of chinese) {
                pinyin += pinyinMap[char] || char;
            }
            return pinyin;
        }

        // 获取字符串首字母
        function getInitials(text) {
            return text.split('').map(char => {
                const pinyinChar = toPinyin(char);
                return pinyinChar ? pinyinChar[0] : '';
            }).join('');
        }

        // 为大学数据预计算搜索关键词
        function precomputeSearchData() {
            universities.forEach(university => {
                // 预计算拼音和首字母
                university._searchData = {
                    nameLower: university.name.toLowerCase(),
                    cityLower: university.city.toLowerCase(),
                    descriptionLower: university.description.toLowerCase(),
                    logoLower: university.logo.toLowerCase(),
                    rankingLower: university.ranking.toLowerCase(),
                    namePinyin: toPinyin(university.name),
                    nameInitials: getInitials(university.name),
                    allKeywords: [
                        university.name.toLowerCase(),
                        university.city.toLowerCase(),
                        university.description.toLowerCase(),
                        university.logo.toLowerCase(),
                        university.ranking.toLowerCase(),
                        toPinyin(university.name),
                        getInitials(university.name)
                    ].filter(kw => kw).join(' ')
                };
            });
        }

        // 模糊匹配函数 - 优化版
        function fuzzyMatch(university, pattern) {
            if (!pattern) return true;
            
            const patternLower = pattern.toLowerCase();
            const searchData = university._searchData;
            
            // 如果有关键词数据，直接检查关键词字符串
            if (searchData.allKeywords.includes(patternLower)) {
                return true;
            }
            
            // 检查各个字段
            if (searchData.nameLower.includes(patternLower) ||
                searchData.cityLower.includes(patternLower) ||
                searchData.descriptionLower.includes(patternLower) ||
                searchData.rankingLower.includes(patternLower) ||
                searchData.logoLower.includes(patternLower) ||
                searchData.namePinyin.includes(patternLower) ||
                searchData.nameInitials.includes(patternLower)) {
                return true;
            }
            
            return false;
        }

        // 高亮文本函数
        function highlightText(text, searchTerm) {
            if (!searchTerm || !text) return text;
            
            const searchLower = searchTerm.toLowerCase();
            const textLower = text.toLowerCase();
            
            // 查找所有匹配位置
            const matches = [];
            let startIndex = 0;
            
            while ((startIndex = textLower.indexOf(searchLower, startIndex)) !== -1) {
                matches.push({
                    start: startIndex,
                    end: startIndex + searchLower.length
                });
                startIndex += searchLower.length;
            }
            
            if (matches.length === 0) return text;
            
            // 构建高亮后的文本
            let highlighted = '';
            let lastIndex = 0;
            
            for (const match of matches) {
                // 添加匹配前的文本
                highlighted += text.substring(lastIndex, match.start);
                // 添加高亮标记
                highlighted += `<mark style="background-color: #ffd700; color: #000; padding: 0 2px; border-radius: 2px;">${text.substring(match.start, match.end)}</mark>`;
                lastIndex = match.end;
            }
            
            // 添加剩余文本
            highlighted += text.substring(lastIndex);
            
            return highlighted;
        }

        // 获取匹配评分用于排序
        function getMatchScore(university, searchTerm) {
            if (!searchTerm) return 0;
            
            const searchLower = searchTerm.toLowerCase();
            const searchData = university._searchData;
            let score = 0;
            
            // 名称完全匹配最高分
            if (searchData.nameLower === searchLower) score += 100;
            else if (searchData.nameLower.startsWith(searchLower)) score += 80;
            else if (searchData.nameLower.includes(searchLower)) score += 50;
            
            // 拼音匹配
            if (searchData.namePinyin === searchLower) score += 60;
            else if (searchData.namePinyin.includes(searchLower)) score += 30;
            
            // 首字母匹配
            if (searchData.nameInitials === searchLower) score += 40;
            else if (searchData.nameInitials.includes(searchLower)) score += 20;
            
            // 其他字段匹配
            if (searchData.cityLower.includes(searchLower)) score += 25;
            if (searchData.descriptionLower.includes(searchLower)) score += 20;
            if (searchData.rankingLower.includes(searchLower)) score += 15;
            
            return score;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            precomputeSearchData(); // 预计算搜索数据
            updateStats();
            renderUniversities();
            setupSearch();
            setupQuickSearch();
        });
    </script>
</body>
